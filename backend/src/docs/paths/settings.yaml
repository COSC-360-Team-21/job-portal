/api/settings/email:
  put:
    summary: Update the authenticated user's email address
    tags: [Settings]
    security:
      - BearerAuth: []
    description: >
      Changes the account email. The current password must be provided to confirm
      the change. The new email must not already be registered on another account.
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/UpdateEmailRequest'
    responses:
      200:
        description: Email updated successfully
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MessageResponse'
      400:
        description: Validation error or email already in use
        content:
          application/json:
            schema:
              oneOf:
                - $ref: '#/components/schemas/ValidationErrorResponse'
                - $ref: '#/components/schemas/ErrorResponse'
            examples:
              emailTaken:
                summary: Email already in use
                value:
                  message: Email already in use
              validationFailed:
                summary: Validation failed
                value:
                  errors:
                    - msg: Valid email required
                      path: newEmail
                      location: body
      401:
        description: Missing or invalid token, or incorrect password
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
            examples:
              notAuthenticated:
                summary: Missing or invalid token
                value:
                  message: Not authorized, no token
              wrongPassword:
                summary: Incorrect current password
                value:
                  message: Incorrect password
      500:
        description: Server error
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'

/api/settings/account:
  delete:
    summary: Permanently delete the authenticated user's account
    tags: [Settings]
    security:
      - BearerAuth: []
    description: >
      Deletes the account and all associated data.
      For employers, all their job listings and the applications on those listings are also deleted.
      For jobseekers, all their submitted applications are deleted.
      The current password must be provided to confirm deletion.
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/DeleteAccountRequest'
    responses:
      200:
        description: Account deleted successfully
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MessageResponse'
      400:
        description: Validation error (missing password field)
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ValidationErrorResponse'
      401:
        description: Missing or invalid token, or incorrect password
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
            examples:
              notAuthenticated:
                summary: Missing or invalid token
                value:
                  message: Not authorized, no token
              wrongPassword:
                summary: Incorrect current password
                value:
                  message: Incorrect password
      500:
        description: Server error
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
