tags:
  - name: Jobs
    description: Job listing CRUD endpoints

paths:
  /api/jobs:
    post:
      summary: Create a new job listing
      tags: [Jobs]
      security:
        - BearerAuth: []
      description: Requires `employer` role.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateJobRequest'
      responses:
        201:
          description: Job created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobListing'
        400:
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
        401:
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        403:
          description: Forbidden — employer role required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    get:
      summary: List all job listings (paginated)
      tags: [Jobs]
      parameters:
        - in: query
          name: page
          schema:
            type: integer
            minimum: 1
            default: 1
          description: Page number
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 10
          description: Results per page
      responses:
        200:
          description: Paginated list of jobs
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedJobsResponse'
        400:
          description: Validation error on query params
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
  /api/jobs/{id}:
    put:
      summary: Update a job listing
      tags: [Jobs]
      security:
        - BearerAuth: []
      description: Employer only. You can only update your own listings.
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          description: MongoDB ObjectId of the job
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateJobRequest'
      responses:
        200:
          description: Updated job
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobListing'
        400:
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
        401:
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        403:
          description: Forbidden — not your listing
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        404:
          description: Job not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      summary: Delete a job listing
      tags: [Jobs]
      security:
        - BearerAuth: []
      description: Employer only. You can only delete your own listings.
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          description: MongoDB ObjectId of the job
      responses:
        200:
          description: Job deleted successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        400:
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
        401:
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        403:
          description: Forbidden — not your listing
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        404:
          description: Job not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  schemas:
    JobListing:
      type: object
      properties:
        _id:
          type: string
          example: 665f1a2b3c4d5e6f7a8b9c0d
        title:
          type: string
          example: Software Engineer
        company:
          type: string
          example: Tech Corp
        location:
          type: string
          example: New York, NY
        description:
          type: string
          example: We are looking for a skilled Software Engineer...
        requirements:
          type: array
          items:
            type: string
          example: [3+ years of experience with Node.js..., Experience with MongoDB...]
        salaryRange:
          type: string
          example: $80,000 - $120,000
        workType:
          type: string
          enum: [Full-time, Part-time, Contract, Internship]
          example: Full-time
        postedBy:
          type: object
          properties:
            _id:
              type: string
              example: 665f1a2b3c4d5e6f7a8b9c0d
            name:
              type: string
              example: Alice Smith
            email:
              type: string
              format: email
              example: alice@example.com

    PaginatedJobsResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/JobListing'
        pagination:
          type: object
          properties:
            page:
              type: integer
              example: 1
            limit:
              type: integer
              example: 10
            totalItems:
              type: integer
              example: 25
            totalPages:
              type: integer
              example: 3
            hasNextPage:
              type: boolean
              example: true
            hasPrevPage:
              type: boolean
              example: false

    MyJobListing:
      type: object
      description: A job listing as seen by its owner (no populated postedBy field)
      properties:
        _id:
          type: string
          example: 665f1a2b3c4d5e6f7a8b9c0d
        title:
          type: string
          example: Software Engineer
        company:
          type: string
          example: Tech Corp
        location:
          type: string
          example: New York, NY
        description:
          type: string
          example: We are looking for a skilled Software Engineer...
        requirements:
          type: array
          items:
            type: string
          example: [3+ years of experience with Node.js, Experience with MongoDB]
        salaryRange:
          type: string
          example: $80,000 - $120,000
        workType:
          type: string
          enum: [Full-time, Part-time, Contract, Internship]
          example: Full-time
        status:
          type: string
          enum: [active, closed]
          example: active
        postedAt:
          type: string
          format: date-time
          example: '2025-06-01T10:00:00.000Z'
        applicationDeadline:
          type: string
          format: date-time
          example: '2025-07-01T00:00:00.000Z'
        createdAt:
          type: string
          format: date-time
          example: '2025-06-01T10:00:00.000Z'
        updatedAt:
          type: string
          format: date-time
          example: '2025-06-01T10:00:00.000Z'

    PaginatedMyJobsResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/MyJobListing'
        pagination:
          type: object
          properties:
            page:
              type: integer
              example: 1
            limit:
              type: integer
              example: 10
            totalItems:
              type: integer
              example: 5
            totalPages:
              type: integer
              example: 1
            hasNextPage:
              type: boolean
              example: false
            hasPrevPage:
              type: boolean
              example: false

    CreateJobRequest:
      type: object
      required: [title, company, location, description, workType]
      properties:
        title:
          type: string
          example: Software Engineer
        company:
          type: string
          example: Tech Corp
        location:
          type: string
          example: New York, NY
        description:
          type: string
          example: We are looking for a skilled Software Engineer...
        requirements:
          type: array
          items:
            type: string
          example: [3+ years of experience with Node.js..., Experience with MongoDB...]
        salaryRange:
          type: string
          example: $80,000 - $120,000
        workType:
          type: string
          enum: [Full-time, Part-time, Contract, Internship]
          example: Full-time

    UpdateJobRequest:
      type: object
      properties:
        title:
          type: string
        company:
          type: string
        location:
          type: string
        description:
          type: string
        requirements:
          type: array
          items:
            type: string
        salaryRange:
          type: string
        workType:
          type: string
          enum: [Full-time, Part-time, Contract, Internship]
