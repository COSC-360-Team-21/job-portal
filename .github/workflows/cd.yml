name: CD

on:
  workflow_run:
    workflows: [CI]          # triggers when the CI workflow finishes
    branches: [main]
    types: [completed]

# Cancel a queued deploy for the same branch if a newer one arrives
concurrency:
  group: deploy-${{ github.event.workflow_run.head_branch }}
  cancel-in-progress: true

jobs:
  # ── Deploy backend to Render ────────────────────────────────────────────────
  deploy-backend:
    name: Deploy Backend → Render
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render deploy hook
        run: |
          curl -fsSL -X POST "${{ secrets.RENDER_DEPLOY_HOOK_BACKEND }}" \
            -o /dev/null \
            -w "Render responded: HTTP %{http_code}\n"

  # Frontend is deployed automatically by Vercel's GitHub integration on push to main.
  # It reads VITE_API_URL from Vercel project settings and rebuilds on every push.
  # No CLI step needed here.
